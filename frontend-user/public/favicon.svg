<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background / Glow gradients -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring (Radar Scope) -->
  <circle cx="256" cy="256" r="230" stroke="#1e293b" stroke-width="8" fill="none" stroke-dasharray="20 10" />
  
  <!-- Outer glowing sweep -->
  <circle cx="256" cy="256" r="210" stroke="url(#glowGrad)" stroke-width="4" fill="none" opacity="0.6" />

  <!-- Shield Base -->
  <path d="M 256, 70 C 160, 70 96, 110 96, 210 C 96, 320 200, 410 256, 460 C 312, 410 416, 320 416, 210 C 416, 110 352, 70 256, 70 Z" 
        fill="#0f172a" 
        stroke="url(#shieldGrad)" 
        stroke-width="18" 
        filter="url(#glow)" />

  <!-- Inner Tech Detail (Target/AI Core) -->
  <path d="M 256, 110 C 180, 110 130, 140 130, 210 C 130, 290 210, 360 256, 400 C 302, 360 382, 290 382, 210 C 382, 140 332, 110 256, 110 Z" 
        fill="none" 
        stroke="#1e293b" 
        stroke-width="4" 
        stroke-dasharray="8 8" />

  <!-- Scanning Eye / Radar Core -->
  <circle cx="256" cy="230" r="60" fill="#0f172a" stroke="#06b6d4" stroke-width="8" />
  <circle cx="256" cy="230" r="30" fill="url(#shieldGrad)" />
  
  <!-- Scan line overlay -->
  <path d="M 120, 230 L 392, 230" stroke="#22d3ee" stroke-width="6" opacity="0.8" filter="url(#glow)" />
  <!-- Small tech crosshairs -->
  <path d="M 256, 140 L 256, 170 M 256, 290 L 256, 320" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" />
</svg>